<!DOCTYPE html>
<html>
<head>
    <title>AEGIS AI Chat Hub</title>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0f172a; color: white; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; display: flex; gap: 20px; }
        .sidebar { width: 300px; background: #1e293b; border-radius: 10px; padding: 20px; }
        .chat-area { flex: 1; background: #1e293b; border-radius: 10px; padding: 20px; display: flex; flex-direction: column; height: 80vh; }
        .messages { flex: 1; overflow-y: auto; margin-bottom: 20px; }
        .msg { padding: 10px; margin: 10px 0; border-radius: 10px; max-width: 70%; }
        .user { background: #3b82f6; margin-left: auto; text-align: right; }
        .assistant { background: #10b981; margin-right: auto; }
        input, select, button { padding: 10px; margin: 5px 0; border-radius: 5px; border: none; }
        input { flex: 1; background: #334155; color: white; }
        button { background: #3b82f6; color: white; cursor: pointer; }
        button:hover { background: #2563eb; }
        .conversation { padding: 10px; margin: 5px 0; background: #334155; border-radius: 5px; cursor: pointer; }
        .conversation:hover { background: #3b82f6; }
        .active { background: #10b981; }
        h3 { margin-bottom: 15px; }
        .input-bar { display: flex; gap: 10px; }
        .btn-danger { background: #ef4444; }
        .btn-danger:hover { background: #dc2626; }
        .btn-warning { background: #f59e0b; }
        .btn-warning:hover { background: #d97706; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h3>🤖 AI Chat Hub</h3>
            <button onclick="newConversation()" style="width: 100%;">+ New Conversation</button>
            <select id="aiSelect" style="width: 100%;">
                <option value="mock">Mock AI</option>
                <option value="openai">ChatGPT</option>
                <option value="claude">Claude</option>
                <option value="groq">Groq</option>
            </select>
            <button onclick="exportAll()" style="width: 100%;" class="btn-warning">📦 Export All</button>
            <button onclick="importChat()" style="width: 100%;">📥 Import Chat</button>
            <hr style="margin: 15px 0; border-color: #334155;">
            <div id="convList"></div>
        </div>
        <div class="chat-area">
            <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                <h3 id="convTitle">Select a conversation</h3>
                <button onclick="logout()" class="btn-danger">Logout</button>
            </div>
            <div id="messages" class="messages"></div>
            <div class="input-bar">
                <input type="text" id="messageInput" placeholder="Type your message..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('token');
        let currentConvId = null;
        let aiProvider = 'mock';

        async function init() {
            if (!token) {
                await demoLogin();
            }
            await loadConversations();
            document.getElementById('aiSelect').onchange = (e) => aiProvider = e.target.value;
        }

        async function demoLogin() {
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: 'demo', password: 'demo123'})
                });
                if (res.ok) {
                    const data = await res.json();
                    token = data.token;
                    localStorage.setItem('token', token);
                } else {
                    // Try admin
                    const res2 = await fetch('/api/login', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({username: 'admin', password: 'admin123'})
                    });
                    if (res2.ok) {
                        const data = await res2.json();
                        token = data.token;
                        localStorage.setItem('token', token);
                    }
                }
            } catch(e) {
                console.error('Login failed:', e);
            }
        }

        async function loadConversations() {
            if (!token) return;
            const res = await fetch('/api/conversations', {
                headers: {'Authorization': `Bearer ${token}`}
            });
            if (!res.ok) return;
            const convs = await res.json();
            const list = document.getElementById('convList');
            if (convs.length === 0) {
                list.innerHTML = '<div style="text-align:center; color:#64748b;">No conversations yet<br>Click "New Conversation"</div>';
                return;
            }
            list.innerHTML = convs.map(c => `
                <div class="conversation ${currentConvId === c.id ? 'active' : ''}" onclick="loadConversation(${c.id})">
                    ${c.title.substring(0, 30)}
                </div>
            `).join('');
        }

        async function loadConversation(id) {
            currentConvId = id;
            const res = await fetch(`/api/conversation/${id}`, {
                headers: {'Authorization': `Bearer ${token}`}
            });
            const data = await res.json();
            document.getElementById('convTitle').innerText = data.title;
            const messagesDiv = document.getElementById('messages');
            if (data.messages.length === 0) {
                messagesDiv.innerHTML = '<div style="text-align:center; color:#64748b;">No messages yet. Start chatting!</div>';
            } else {
                messagesDiv.innerHTML = data.messages.map(m => `
                    <div class="msg ${m.role}">${escapeHtml(m.content)}</div>
                `).join('');
            }
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            await loadConversations();
        }

        async function newConversation() {
            const res = await fetch('/api/conversation', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                body: JSON.stringify({title: `Chat ${new Date().toLocaleString()}`, ai_provider: aiProvider})
            });
            const data = await res.json();
            await loadConversation(data.id);
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            if (!content || !currentConvId) return;
            
            const messagesDiv = document.getElementById('messages');
            if (messagesDiv.children.length === 1 && messagesDiv.children[0].innerText.includes('No messages')) {
                messagesDiv.innerHTML = '';
            }
            messagesDiv.innerHTML += `<div class="msg user">${escapeHtml(content)}</div>`;
            input.value = '';
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            await fetch(`/api/conversation/${currentConvId}/message`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                body: JSON.stringify({role: 'user', content: content})
            });
            
            const aiResponse = `🤖 ${aiProvider.toUpperCase()}: I received "${content.substring(0, 100)}". This is a demo response.`;
            messagesDiv.innerHTML += `<div class="msg assistant">${escapeHtml(aiResponse)}</div>`;
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            await fetch(`/api/conversation/${currentConvId}/message`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                body: JSON.stringify({role: 'assistant', content: aiResponse})
            });
        }

        async function exportAll() {
            const res = await fetch('/api/conversations', {
                headers: {'Authorization': `Bearer ${token}`}
            });
            const convs = await res.json();
            if (convs.length === 0) {
                alert('No conversations to export');
                return;
            }
            const ids = convs.map(c => c.id);
            const exportRes = await fetch('/api/batch-export', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                body: JSON.stringify({conversation_ids: ids})
            });
            const data = await exportRes.json();
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `all_conversations_${Date.now()}.json`;
            link.click();
            alert(`Exported ${data.total} conversations!`);
        }

        function importChat() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.txt,.json';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = async (event) => {
                    const content = event.target.result;
                    const title = prompt('Enter title for this conversation:', `Imported ${new Date().toLocaleString()}`);
                    if (title) {
                        const res = await fetch('/api/import', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                            body: JSON.stringify({content: content, title: title})
                        });
                        const data = await res.json();
                        alert(`Imported ${data.message_count} messages!`);
                        await loadConversations();
                        await loadConversation(data.conversation_id);
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        init();
    </script>
</body>
</html>
