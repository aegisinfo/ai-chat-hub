<!DOCTYPE html>
<html>
<head>
    <title>AEGIS AI Chat Hub</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #1a1a2e; color: white; }
        .container { max-width: 1200px; margin: 0 auto; display: flex; gap: 20px; }
        .sidebar { width: 300px; background: #16213e; padding: 20px; border-radius: 10px; }
        .chat-area { flex: 1; background: #16213e; padding: 20px; border-radius: 10px; }
        .messages { height: 500px; overflow-y: auto; margin-bottom: 20px; }
        .msg { padding: 10px; margin: 10px 0; border-radius: 10px; }
        .user { background: #0f3460; text-align: right; }
        .assistant { background: #e94560; }
        input, select, button { padding: 10px; margin: 5px; border-radius: 5px; border: none; }
        button { background: #e94560; color: white; cursor: pointer; }
        .conversation { padding: 10px; margin: 5px 0; background: #0f3460; border-radius: 5px; cursor: pointer; }
        .conversation:hover { background: #e94560; }
        .active { background: #e94560; }
        h3 { margin-top: 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h3>AI Chat Hub</h3>
            <button onclick="newConversation()">+ New Chat</button>
            <select id="aiSelect">
                <option value="mock">Mock AI</option>
                <option value="openai">ChatGPT</option>
                <option value="claude">Claude</option>
                <option value="groq">Groq</option>
            </select>
            <button onclick="exportAll()">Export All</button>
            <button onclick="importChat()">Import Chat</button>
            <hr>
            <div id="convList"></div>
        </div>
        <div class="chat-area">
            <div style="display: flex; justify-content: space-between;">
                <h3 id="convTitle">Select a conversation</h3>
                <button onclick="logout()">Logout</button>
            </div>
            <div id="messages" class="messages"></div>
            <div>
                <input type="text" id="messageInput" placeholder="Type your message..." style="width: 80%;">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('token');
        let currentConvId = null;
        let aiProvider = 'mock';

        async function init() {
            if (!token) {
                await demoLogin();
            }
            await loadConversations();
            document.getElementById('aiSelect').onchange = (e) => aiProvider = e.target.value;
        }

        async function demoLogin() {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: 'demo', password: 'demo123'})
            });
            const data = await res.json();
            token = data.token;
            localStorage.setItem('token', token);
        }

        async function loadConversations() {
            const res = await fetch('/api/conversations', {
                headers: {'Authorization': `Bearer ${token}`}
            });
            const convs = await res.json();
            const list = document.getElementById('convList');
            list.innerHTML = convs.map(c => `
                <div class="conversation ${currentConvId === c.id ? 'active' : ''}" onclick="loadConversation(${c.id})">
                    ${c.title}
                </div>
            `).join('');
        }

        async function loadConversation(id) {
            currentConvId = id;
            const res = await fetch(`/api/conversation/${id}`, {
                headers: {'Authorization': `Bearer ${token}`}
            });
            const data = await res.json();
            document.getElementById('convTitle').innerText = data.title;
            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = data.messages.map(m => `
                <div class="msg ${m.role}">${m.content}</div>
            `).join('');
            await loadConversations();
        }

        async function newConversation() {
            const res = await fetch('/api/conversation', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                body: JSON.stringify({title: `Chat ${new Date().toLocaleString()}`, ai_provider: aiProvider})
            });
            const data = await res.json();
            await loadConversation(data.id);
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            if (!content || !currentConvId) return;
            
            // Add user message
            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML += `<div class="msg user">${content}</div>`;
            input.value = '';
            
            // Save user message
            await fetch(`/api/conversation/${currentConvId}/message`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                body: JSON.stringify({role: 'user', content: content})
            });
            
            // Get AI response
            const aiResponse = `AI (${aiProvider}): I received "${content}". This is a demo response.`;
            messagesDiv.innerHTML += `<div class="msg assistant">${aiResponse}</div>`;
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            // Save AI response
            await fetch(`/api/conversation/${currentConvId}/message`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                body: JSON.stringify({role: 'assistant', content: aiResponse})
            });
        }

        async function exportAll() {
            const res = await fetch('/api/conversations', {
                headers: {'Authorization': `Bearer ${token}`}
            });
            const convs = await res.json();
            const ids = convs.map(c => c.id);
            const exportRes = await fetch('/api/batch-export', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                body: JSON.stringify({conversation_ids: ids})
            });
            const data = await exportRes.json();
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `all_conversations_${Date.now()}.json`;
            link.click();
        }

        function importChat() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.txt,.json';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = async (event) => {
                    const content = event.target.result;
                    const title = prompt('Title:', `Imported ${new Date().toLocaleString()}`);
                    if (title) {
                        await fetch('/api/import', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                            body: JSON.stringify({content: content, title: title})
                        });
                        await loadConversations();
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        init();
    </script>
</body>
</html>
