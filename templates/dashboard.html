<!DOCTYPE html>
<html>
<body class="center">

<div class="card">
<h2>Dashboard</h2>

{% for c in convos %}
<div style="background:#1f2937;padding:10px;margin-top:10px;border-radius:8px">
    <b>{{ c.source }}</b><br>
    <small>{{ c.timestamp }}</small>
    <p>{{ c.content[:200] }}</p>
</div>
{% endfor %}

<a href="/chat-page">← Back</a>
</div>

</body>
