<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AEGIS Chat</title>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<style>
body{
  margin:0;
  display:flex;
  height:100vh;
  background:#020617;
  color:white;
  font-family:sans-serif;
}

.sidebar{
  width:260px;
  background:#111827;
  padding:10px;
  display:flex;
  flex-direction:column;
}

.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

#messages{
  flex:1;
  overflow:auto;
  padding:20px;
}

.msg{
  margin:10px;
  padding:12px;
  border-radius:10px;
  max-width:70%;
}

.user{background:#1f2937; align-self:flex-end}
.ai{background:#0f172a; align-self:flex-start}

input{
  padding:12px;
  border:none;
  outline:none;
  background:#1f2937;
  color:white;
}

button{
  padding:12px;
  background:#22c55e;
  border:none;
  cursor:pointer;
}

.chat-item{
  padding:10px;
  cursor:pointer;
}
.chat-item:hover{
  background:#1f2937;
}

.banner{
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  background:red;
  padding:10px;
  display:none;
}
</style>
</head>

<body>

<div id="banner" class="banner"></div>

<!-- SIDEBAR -->
<div class="sidebar">
  <input id="search" placeholder="Search..." oninput="searchChats()">
  <button onclick="newChat()">+ New Chat</button>
  <div id="chatList"></div>
</div>

<!-- MAIN -->
<div class="main">
  <div id="messages"></div>

  <div style="display:flex">
    <input id="prompt" placeholder="Type a message..." onkeydown="if(event.key==='Enter') send()">
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
let token = localStorage.getItem("token")
let socket = io({ auth: { token } })

let room = "room_" + Date.now()
let currentAI = null

// ---------------- ERROR UI ----------------
function showError(msg){
  banner.innerText = msg
  banner.style.display = "block"
  setTimeout(()=>banner.style.display="none",3000)
}

// ---------------- SAFE FETCH ----------------
async function safeFetch(url, opt={}){
  try{
    let r = await fetch(url, opt)
    let t = await r.text()

    if(!t) return []

    return JSON.parse(t)
  }catch(e){
    console.error("Fetch error:", e)
    showError("Network / JSON error")
    return []
  }
}

// ---------------- SOCKET ----------------
socket.emit("join",{room})

socket.on("ai_stream", d=>{
  if(!currentAI) currentAI = addMessage("ai","")
  currentAI.innerText += d.token
  messages.scrollTop = messages.scrollHeight
})

// ---------------- SEND ----------------
function send(){
  let input = document.getElementById("prompt")
  let text = input.value.trim()

  if(!text) return

  addMessage("user", text)

  currentAI = addMessage("ai","")

  socket.emit("message",{
    prompt: text,
    room,
    token
  })

  input.value = ""
}

// ---------------- UI ----------------
function addMessage(role,text){
  let d = document.createElement("div")
  d.className = "msg " + role
  d.innerText = text
  messages.appendChild(d)
  return d
}

// ---------------- CHAT LIST ----------------
async function loadChats(){
  chatList.innerHTML = "Loading..."

  let data = await safeFetch("/chats",{
    headers:{Authorization:"Bearer "+token}
  })

  chatList.innerHTML = ""

  if(!Array.isArray(data)){
    showError("Invalid chats data")
    return
  }

  data.forEach(c=>{
    let d = document.createElement("div")
    d.className = "chat-item"
    d.innerText = c.title || c.room

    d.onclick = ()=>loadChat(c.room)

    chatList.appendChild(d)
  })
}

// ---------------- LOAD CHAT ----------------
async function loadChat(r){
  room = r
  messages.innerHTML = ""

  let data = await safeFetch("/chat/"+r,{
    headers:{Authorization:"Bearer "+token}
  })

  if(!Array.isArray(data)) return

  data.forEach(m=>{
    addMessage("user", m.prompt)
    addMessage("ai", m.response)
  })
}

// ---------------- SEARCH ----------------
async function searchChats(){
  let q = search.value

  let data = await safeFetch("/chats",{
    headers:{Authorization:"Bearer "+token}
  })

  chatList.innerHTML = ""

  if(!Array.isArray(data)) return

  data
    .filter(c => c.title?.toLowerCase().includes(q.toLowerCase()))
    .forEach(c=>{
      let d = document.createElement("div")
      d.className="chat-item"
      d.innerText=c.title
      d.onclick=()=>loadChat(c.room)
      chatList.appendChild(d)
    })
}

// ---------------- NEW CHAT ----------------
function newChat(){
  room = "room_" + Date.now()
  messages.innerHTML = ""
}

// ---------------- INIT ----------------
loadChats()
</script>

</body>
</html>
