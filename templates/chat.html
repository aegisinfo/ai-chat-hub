<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AEGIS - Multi-AI Chat Hub with Export/Import</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    margin: 0;
    display: flex;
    height: 100vh;
    background: #020617;
    color: #e5e7eb;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
}

.sidebar {
    width: 320px;
    background: #0f172a;
    border-right: 1px solid #1e293b;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.sidebar-header {
    padding: 20px;
    border-bottom: 1px solid #1e293b;
}

.sidebar-header h2 {
    font-size: 20px;
    margin-bottom: 15px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.new-chat-btn {
    width: 100%;
    padding: 12px;
    background: #22c55e;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    margin-bottom: 10px;
}

.new-chat-btn:hover { background: #16a34a; }

.ai-selector {
    margin: 15px 0;
}

.ai-selector select {
    width: 100%;
    padding: 10px;
    background: #1e293b;
    color: white;
    border: 1px solid #334155;
    border-radius: 6px;
    cursor: pointer;
}

.export-buttons {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

.export-buttons button {
    flex: 1;
    padding: 8px;
    background: #3b82f6;
    border: none;
    border-radius: 6px;
    color: white;
    cursor: pointer;
    font-size: 12px;
}

.export-buttons button:hover { background: #2563eb; }

.import-share-buttons {
    display: flex;
    gap: 10px;
    margin-top: 5px;
}

.import-share-buttons button {
    flex: 1;
    padding: 8px;
    background: #8b5cf6;
    border: none;
    border-radius: 6px;
    color: white;
    cursor: pointer;
    font-size: 12px;
}

.import-share-buttons button:hover { background: #7c3aed; }

.batch-export-btn {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    background: #6b7280;
    border: none;
    border-radius: 6px;
    color: white;
    cursor: pointer;
    font-size: 12px;
}

.batch-export-btn:hover { background: #4b5563; }

.conversations-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}

.conversation-item {
    padding: 12px;
    margin: 5px 0;
    background: #1e293b;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
}

.conversation-item:hover {
    background: #334155;
    transform: translateX(5px);
}

.conversation-item.active {
    background: #22c55e;
    color: white;
}

.conversation-title {
    font-weight: 500;
    margin-bottom: 5px;
    font-size: 14px;
}

.conversation-meta {
    font-size: 11px;
    opacity: 0.7;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.delete-conv {
    background: #ef4444;
    color: white;
    border: none;
    padding: 4px 8px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
}

.delete-conv:hover { background: #dc2626; }

.main {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #020617;
}

.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px;
    border-bottom: 1px solid #1e293b;
    background: #0f172a;
}

.topbar h1 {
    font-size: 24px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.user-info {
    display: flex;
    gap: 15px;
    align-items: center;
}

.logout-btn {
    padding: 8px 16px;
    background: #ef4444;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

.msg {
    max-width: 70%;
    padding: 12px 16px;
    border-radius: 12px;
    margin: 10px 0;
    word-wrap: break-word;
}

.user {
    background: #1e293b;
    margin-left: auto;
    border-bottom-right-radius: 4px;
}

.assistant {
    background: #0f172a;
    margin-right: auto;
    border-bottom-left-radius: 4px;
    border-left: 3px solid #22c55e;
}

.thinking {
    color: #94a3b8;
    font-style: italic;
    padding: 10px;
}

.input-bar {
    display: flex;
    padding: 20px;
    border-top: 1px solid #1e293b;
    background: #0f172a;
    gap: 10px;
}

.input-bar input {
    flex: 1;
    padding: 12px;
    background: #1e293b;
    border: 1px solid #334155;
    color: white;
    border-radius: 8px;
    font-size: 14px;
}

.input-bar input:focus {
    outline: none;
    border-color: #22c55e;
}

.input-bar button {
    padding: 12px 24px;
    background: #22c55e;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    font-weight: 600;
}

.input-bar button:hover { background: #16a34a; }

.empty-state {
    text-align: center;
    padding: 40px;
    color: #64748b;
}

@keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
}
</style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <h2>🤖 AEGIS AI Hub</h2>
        <button class="new-chat-btn" onclick="createNewConversation()">+ New Conversation</button>
        
        <div class="ai-selector">
            <select id="aiProviderSelect">
                <option value="openai">ChatGPT (OpenAI)</option>
                <option value="groq">Groq (Mixtral)</option>
                <option value="claude">Claude (Anthropic)</option>
                <option value="mock">Mock AI (Testing)</option>
            </select>
        </div>
        
        <div class="export-buttons">
            <button onclick="exportConversation('json')">📄 JSON</button>
            <button onclick="exportConversation('markdown')">📝 MD</button>
            <button onclick="exportConversation('txt')">📃 TXT</button>
        </div>
        
        <div class="import-share-buttons">
            <button onclick="importConversation()">📥 Import</button>
            <button onclick="shareConversation()">🔗 Share</button>
        </div>
        
        <button class="batch-export-btn" onclick="batchExport()">📦 Export All Conversations</button>
    </div>
    
    <div class="conversations-list" id="conversationsList">
        <div class="empty-state">No conversations yet.<br>Click "New Conversation" to start!</div>
    </div>
</div>

<div class="main">
    <div class="topbar">
        <h1>AEGIS <span style="font-size:14px;">Multi-AI Chat with Export/Import</span></h1>
        <div class="user-info">
            <span id="userName">Loading...</span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div id="messages" class="messages">
        <div class="empty-state">Select a conversation or create a new one to start chatting!</div>
    </div>

    <div class="input-bar">
        <input id="promptInput" type="text" placeholder="Type your message..." 
               onkeydown="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
let socket = null;
let currentConversationId = null;
let currentAiProvider = 'mock';
let currentStreamingMessage = null;
let userName = '';

async function init() {
    await autoLogin();
    await loadConversations();
    await loadAvailableAIProviders();
    connectSocket();
    
    document.getElementById('aiProviderSelect').addEventListener('change', (e) => {
        currentAiProvider = e.target.value;
    });
}

async function autoLogin() {
    try {
        let token = localStorage.getItem('token');
        if (!token) {
            const response = await fetch('/auto-login');
            const data = await response.json();
            token = data.token;
            userName = data.user;
            localStorage.setItem('token', token);
            localStorage.setItem('user', data.user);
        } else {
            userName = localStorage.getItem('user') || 'User';
        }
        document.getElementById('userName').textContent = userName;
    } catch (error) {
        console.error('Auto-login failed:', error);
    }
}

async function loadAvailableAIProviders() {
    try {
        const response = await fetch('/ai-providers');
        const providers = await response.json();
        const select = document.getElementById('aiProviderSelect');
        
        for (const [key, provider] of Object.entries(providers)) {
            const option = select.querySelector(`option[value="${key}"]`);
            if (option && !provider.available && key !== 'mock') {
                option.disabled = true;
                option.text += ' (Not Available)';
            }
        }
        
        // Set default to mock if available
        if (providers.mock && providers.mock.available) {
            currentAiProvider = 'mock';
            select.value = 'mock';
        }
    } catch (error) {
        console.error('Failed to load AI providers:', error);
    }
}

function connectSocket() {
    const token = localStorage.getItem('token');
    socket = io(window.location.origin, { auth: { token: token } });
    
    socket.on('connect', () => {
        console.log('Socket connected');
        if (currentConversationId) {
            socket.emit('join', { conversation_id: currentConversationId });
        }
    });
    
    socket.on('ai_thinking', () => {
        const messagesDiv = document.getElementById('messages');
        const thinking = document.createElement('div');
        thinking.id = 'thinking-indicator';
        thinking.className = 'thinking';
        thinking.innerHTML = '🤔 AI is thinking...';
        messagesDiv.appendChild(thinking);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });
    
    socket.on('ai_stream', (data) => {
        const thinking = document.getElementById('thinking-indicator');
        if (thinking) thinking.remove();
        
        if (!currentStreamingMessage) {
            currentStreamingMessage = addMessage('', 'assistant');
        }
        currentStreamingMessage.textContent += data.chunk;
        
        const messagesDiv = document.getElementById('messages');
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });
    
    socket.on('ai_complete', () => {
        currentStreamingMessage = null;
        loadConversations();
    });
    
    socket.on('error', (data) => {
        console.error('Socket error:', data);
        showNotification('Error: ' + data.message, 'error');
    });
}

async function loadConversations() {
    try {
        const token = localStorage.getItem('token');
        const response = await fetch('/conversations', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        
        const conversations = await response.json();
        const listDiv = document.getElementById('conversationsList');
        
        if (conversations.length === 0) {
            listDiv.innerHTML = '<div class="empty-state">No conversations yet.<br>Click "New Conversation" to start!</div>';
            return;
        }
        
        listDiv.innerHTML = conversations.map(conv => `
            <div class="conversation-item ${currentConversationId === conv.id ? 'active' : ''}" 
                 onclick="loadConversation(${conv.id})">
                <div class="conversation-title">${escapeHtml(conv.title)}</div>
                <div class="conversation-meta">
                    <span>🤖 ${conv.ai_provider}</span>
                    <span>📅 ${new Date(conv.updated_at).toLocaleString()}</span>
                    <button class="delete-conv" onclick="event.stopPropagation(); deleteConversation(${conv.id})">🗑️</button>
                </div>
            </div>
        `).join('');
    } catch (error) {
        console.error('Failed to load conversations:', error);
    }
}

async function createNewConversation() {
    try {
        const token = localStorage.getItem('token');
        const response = await fetch('/conversation', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({
                title: `Chat ${new Date().toLocaleString()}`,
                ai_provider: currentAiProvider
            })
        });
        
        const conversation = await response.json();
        await loadConversation(conversation.id);
        await loadConversations();
        showNotification('New conversation created!', 'success');
    } catch (error) {
        console.error('Failed to create conversation:', error);
        showNotification('Failed to create conversation', 'error');
    }
}

async function loadConversation(conversationId) {
    try {
        const token = localStorage.getItem('token');
        const response = await fetch(`/conversation/${conversationId}`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        
        const conversation = await response.json();
        currentConversationId = conversation.id;
        currentAiProvider = conversation.ai_provider;
        
        document.getElementById('aiProviderSelect').value = currentAiProvider;
        
        const messagesDiv = document.getElementById('messages');
        if (conversation.messages.length === 0) {
            messagesDiv.innerHTML = '<div class="empty-state">No messages yet. Start the conversation!</div>';
        } else {
            messagesDiv.innerHTML = conversation.messages.map(msg => 
                `<div class="msg ${msg.role}">${escapeHtml(msg.content)}</div>`
            ).join('');
        }
        
        if (socket) {
            socket.emit('join', { conversation_id: conversationId });
        }
        
        await loadConversations();
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    } catch (error) {
        console.error('Failed to load conversation:', error);
        showNotification('Failed to load conversation', 'error');
    }
}

async function deleteConversation(conversationId) {
    if (!confirm('Are you sure you want to delete this conversation?')) return;
    
    try {
        const token = localStorage.getItem('token');
        await fetch(`/conversation/${conversationId}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (currentConversationId === conversationId) {
            currentConversationId = null;
            document.getElementById('messages').innerHTML = '<div class="empty-state">Select a conversation or create a new one to start chatting!</div>';
        }
        
        await loadConversations();
        showNotification('Conversation deleted', 'success');
    } catch (error) {
        console.error('Failed to delete conversation:', error);
        showNotification('Failed to delete conversation', 'error');
    }
}

function sendMessage() {
    const input = document.getElementById('promptInput');
    const content = input.value.trim();
    
    if (!content || !currentConversationId || !socket) {
        if (!currentConversationId) {
            showNotification('Please create or select a conversation first!', 'error');
        }
        return;
    }
    
    addMessage(content, 'user');
    input.value = '';
    
    socket.emit('message', {
        conversation_id: currentConversationId,
        content: content,
        ai_provider: currentAiProvider
    });
}

function addMessage(content, role) {
    const messagesDiv = document.getElementById('messages');
    
    if (messagesDiv.children.length === 1 && messagesDiv.children[0].classList?.contains('empty-state')) {
        messagesDiv.innerHTML = '';
    }
    
    const messageDiv = document.createElement('div');
    messageDiv.className = `msg ${role}`;
    messageDiv.textContent = content;
    messagesDiv.appendChild(messageDiv);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
    
    return messageDiv;
}

async function exportConversation(format) {
    if (!currentConversationId) {
        showNotification('No conversation selected', 'error');
        return;
    }
    
    try {
        const token = localStorage.getItem('token');
        const response = await fetch(`/export-conversation/${currentConversationId}?format=${format}`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        
        const data = await response.json();
        
        if (format === 'json') {
            downloadFile(JSON.stringify(data, null, 2), `conversation_${currentConversationId}.json`, 'application/json');
        } else if (format === 'markdown') {
            downloadFile(data.markdown, `conversation_${currentConversationId}.md`, 'text/markdown');
        } else if (format === 'txt') {
            downloadFile(data.text, `conversation_${currentConversationId}.txt`, 'text/plain');
        }
        
        showNotification('Conversation exported successfully!', 'success');
    } catch (error) {
        console.error('Export failed:', error);
        showNotification('Export failed: ' + error.message, 'error');
    }
}

async function importConversation() {
    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = '.json,.html,.txt,.md';
    fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = async (event) => {
            const content = event.target.result;
            const sourceType = prompt('Select source type:\n- auto (auto-detect)\n- chatgpt\n- claude\n- groq\n- text', 'auto');
            
            if (!sourceType) return;
            
            const title = prompt('Enter a title for this conversation:', `Imported ${new Date().toLocaleString()}`);
            if (!title) return;
            
            try {
                const token = localStorage.getItem('token');
                const response = await fetch('/import-conversation', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ content: content, source_type: sourceType, title: title })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showNotification(`Imported ${data.message_count} messages!`, 'success');
                    await loadConversations();
                    await loadConversation(data.conversation_id);
                } else {
                    showNotification(data.error || 'Import failed', 'error');
                }
            } catch (error) {
                console.error('Import failed:', error);
                showNotification('Import failed: ' + error.message, 'error');
            }
        };
        reader.readAsText(file);
    };
    fileInput.click();
}

async function batchExport() {
    const conversations = await getConversationIds();
    if (conversations.length === 0) {
        showNotification('No conversations to export', 'error');
        return;
    }
    
    try {
        const token = localStorage.getItem('token');
        const response = await fetch('/batch-export', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ conversation_ids: conversations })
        });
        
        const data = await response.json();
        downloadFile(JSON.stringify(data, null, 2), `all_conversations_${Date.now()}.json`, 'application/json');
        showNotification(`Exported ${data.total_conversations} conversations!`, 'success');
    } catch (error) {
        console.error('Batch export failed:', error);
        showNotification('Batch export failed: ' + error.message, 'error');
    }
}

async function shareConversation() {
    if (!currentConversationId) {
        showNotification('No conversation selected', 'error');
        return;
    }
    
    try {
        const token = localStorage.getItem('token');
        const response = await fetch(`/conversation/${currentConversationId}/share`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        
        const data = await response.json();
        
        if (response.ok) {
            navigator.clipboard.writeText(data.share_url);
            showNotification('Share link copied to clipboard! Expires in 7 days', 'success');
        } else {
            showNotification(data.error || 'Failed to create share link', 'error');
        }
    } catch (error) {
        console.error('Share failed:', error);
        showNotification('Share failed: ' + error.message, 'error');
    }
}

async function getConversationIds() {
    const token = localStorage.getItem('token');
    const response = await fetch('/conversations', {
        headers: { 'Authorization': `Bearer ${token}` }
    });
    const conversations = await response.json();
    return conversations.map(c => c.id);
}

function downloadFile(content, filename, mimeType) {
    const blob = new Blob([content], { type: mimeType });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    link.click();
    URL.revokeObjectURL(link.href);
}

function showNotification(message, type) {
    const notification = document.createElement('div');
    notification.textContent = message;
    notification.style.cssText = `
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 12px 20px;
        background: ${type === 'success' ? '#22c55e' : '#ef4444'};
        color: white;
        border-radius: 8px;
        z-index: 1000;
        animation: slideIn 0.3s ease;
    `;
    document.body.appendChild(notification);
    setTimeout(() => notification.remove(), 3000);
}

function logout() {
    localStorage.clear();
    location.reload();
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

init();
</script>
</body>
</html>
